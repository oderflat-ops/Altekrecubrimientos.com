    <script src="https://cdn.tailwindcss.com"></script>
    <script>

    <style type="text/tailwindcss">
        @layer utilities {

            .nav-link { @apply flex flex-col items-center gap-1 text-slate-300 hover:text-brand-cyan transition-all text-[0.7rem] font-medium; }
            .nav-icon { @apply w-9 h-9 flex items-center justify-center rounded-full bg-white/5 border border-white/10 text-lg transition-all; }
            .nav-link:hover .nav-icon, .nav-link.active .nav-icon { @apply shadow-[0_0_15px_#00D4FF] border-brand-cyan -translate-y-1 scale-110 text-brand-cyan; }
            .fade-in-section { @apply opacity-0 translate-y-10 blur-sm transition-all duration-700 ease-out; }
            .fade-in-section.is-visible { @apply opacity-100 translate-y-0 blur-none; }
        }
    </style>
</head>
<body class="bg-brand-bg text-white overflow-x-hidden pt-24 pb-20">
    <canvas id="bg-canvas" class="fixed top-0 left-0 w-full h-full z-0 pointer-events-none"></canvas>
    
    <div class="relative z-10">
        <nav class="fixed top-0 left-0 w-full flex justify-start md:justify-center gap-2 md:gap-10 z-50 p-3 bg-brand-bg/95 backdrop-blur-md border-b border-white/10 overflow-x-auto no-scrollbar">
            <a href="/" class="nav-link"><div class="nav-icon"><i class="fa-solid fa-house"></i></div><span class="hidden md:block">Inicio</span></a>

        <section class="py-12 px-6 md:px-12 flex justify-center min-h-[80vh] items-center">

                <p class="text-slate-300 mb-10 text-center max-w-2xl mx-auto">
                    Complete el formulario para que un ingeniero evalúe el estado de sus firmes industriales y coordine una visita a su planta.
                </p>
                
                <div class="grid grid-cols-1 md:grid-cols-5 gap-10">
                    <div class="md:col-span-2 space-y-6">
                        <div class="bg-slate-900/50 p-6 rounded-xl border border-white/5">
                            <h3 class="text-lg font-bold text-brand-cyan mb-4">Vías Rápidas</h3>
                            <a href="https://wa.me/525535820734?text=Hola,%20me%20gustaría%20agendar%20un%20diagnóstico%20técnico." target="_blank" class="flex items-center gap-3 text-slate-300 hover:text-[#25D366] transition-colors mb-4">
                                <i class="fa-brands fa-whatsapp text-2xl"></i>
                                <span>+52 55 3582 0734</span>
                            </a>
                            <div class="flex items-center gap-3 text-slate-300 mb-4">
                                <i class="fa-solid fa-envelope text-xl text-brand-cyan"></i>
                                <span class="text-sm">alfredo.aguilar@altekrecubrimientos.com</span>
                            </div>
                            <a href="https://calendar.app.google/xdpRTJTifcgFxmqK7" target="_blank" class="mt-6 inline-flex items-center justify-center gap-2 w-full py-3 bg-brand-cyan/10 border border-brand-cyan text-brand-cyan rounded-lg font-bold hover:bg-brand-cyan hover:text-brand-bg transition-all">
                                <i class="fa-regular fa-calendar-check"></i> Agendar en Calendario
                            </a>
                        </div>
                    </div>

                    <div class="md:col-span-3">
                        <!-- Formulario B2B Integrado con API -->
                        <form id="altek-hubspot-form" class="grid grid-cols-1 md:grid-cols-2 gap-4 text-left">
                            <div class="col-span-1 md:col-span-2">
                                <label class="block text-sm font-bold text-white mb-1">Nombre Completo</label>
                                <input type="text" name="nombre" required class="w-full p-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-brand-cyan transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-white mb-1">Empresa</label>
                                <input type="text" name="empresa" required class="w-full p-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-brand-cyan transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-white mb-1">WhatsApp / Teléfono</label>
                                <input type="tel" name="telefono" required class="w-full p-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-brand-cyan transition-colors">
                            </div>
                        <div>
    <label class="block text-sm font-bold text-white mb-1">Correo Electrónico</label>
    <input type="email" name="email" required class="w-full p-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-brand-cyan transition-colors">
></div>    
                         <!-- Tipo de Necesidad (Seleccionable) -->
                        <div class="col-span-1 md:col-span-2">
                            <label class="block text-sm font-bold text-white mb-1">Tipo de Necesidad</label>
                            <select name="proyecto" required class="w-full p-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-brand-cyan transition-colors">
                                <option value="" disabled selected class="bg-slate-900 text-slate-400">Seleccione el servicio requerido...</option>
                                <option value="Pisos Epóxicos" class="bg-slate-900 text-white">Pisos Epóxicos Industriales</option>
                                <option value="Rehabilitación y Bacheo" class="bg-slate-900 text-white">Rehabilitación y Bacheo</option>
                                <option value="Aislamiento de Poliuretano" class="bg-slate-900 text-white">Aislamiento de Poliuretano</option>
                                <option value="Piso Grado Alimenticio" class="bg-slate-900 text-white">Piso Grado Alimenticio</option>
                            </select>
                        </div>

                        <!-- Giro de la Empresa (Seleccionable) -->
                        <div>
                            <label class="block text-sm font-bold text-white mb-1">Giro de la Empresa</label>
                            <select name="giro" required class="w-full p-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-brand-cyan transition-colors">
                                <option value="" disabled selected class="bg-slate-900 text-slate-400">Seleccione el sector...</option>
                                <option value="Automotriz / Aeroespacial" class="bg-slate-900 text-white">Automotriz / Aeroespacial</option>
                                <option value="Logística / CEDIS" class="bg-slate-900 text-white">Logística / CEDIS</option>
                                <option value="Alimentos y Bebidas" class="bg-slate-900 text-white">Alimentos y Bebidas</option>
                                <option value="Metalmecánica / Tratamientos" class="bg-slate-900 text-white">Metalmecánica / Tratamiento de Superficies</option>
                                <option value="Inyección de Plásticos" class="bg-slate-900 text-white">Inyección de Plásticos / Manufactura</option>
                                <option value="Cámaras de Refrigeración" class="bg-slate-900 text-white">Cámaras de Refrigeración</option>
                                <option value="Otro" class="bg-slate-900 text-white">Otro</option>
                            </select>
                        </div>

                        <!-- Metraje Aproximado (Seleccionable) -->
                        <div>
                            <label class="block text-sm font-bold text-white mb-1">Metraje Aproximado</label>
                            <select name="metraje" required class="w-full p-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-brand-cyan transition-colors">
                                <option value="" disabled selected class="bg-slate-900 text-slate-400">Seleccione el área...</option>
                                <option value="Menos de 100 m2" class="bg-slate-900 text-white">Menos de 100 m²</option>
                                <option value="100 - 500 m2" class="bg-slate-900 text-white">De 100 a 500 m²</option>
                                <option value="500 - 1000 m2" class="bg-slate-900 text-white">De 500 a 1,000 m²</option>
                                <option value="1000 - 3000 m2" class="bg-slate-900 text-white">De 1,000 a 3,000 m²</option>
                                <option value="Más de 3000 m2" class="bg-slate-900 text-white">Mayor a 3,000 m²</option>
                            </select>
                        </div>   

                       
                         

                            <div class="col-span-1 md:col-span-2">
                                <label class="block text-sm font-bold text-white mb-1">Comentarios adicionales (Opcional)</label>
                                <textarea name="mensaje" rows="2" class="w-full p-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-brand-cyan transition-colors"></textarea>
                            </div>
                            <div class="col-span-1 md:col-span-2 mt-2">
                                <button id="submit-btn" type="submit" class="w-full p-4 bg-brand-orange text-white font-extrabold text-lg uppercase rounded-lg hover:shadow-[0_0_20px_rgba(245,124,0,0.5)] hover:bg-[#FF8F24] transition-all">Enviar Solicitud</button>
                            </div>
                            <div id="form-status" class="col-span-1 md:col-span-2 text-center font-bold text-sm hidden mt-2"></div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- SCRIPT DE INTEGRACIÓN HUBSPOT API -->
    <script>
        document.getElementById('altek-hubspot-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // --- REEMPLAZA ESTOS DOS VALORES CON TUS IDs DE HUBSPOT ---
            const portalId = '51716224'; 
            const formId = '18c2435c-952d-40d3-929c-e77c4b3b627f';
            // ----------------------------------------------------------

            const btn = document.getElementById('submit-btn');
            const statusDiv = document.getElementById('form-status');
            
            btn.innerHTML = 'Procesando...';
            btn.disabled = true;

            const nombre = document.querySelector('input[name="nombre"]').value;
            const empresa = document.querySelector('input[name="empresa"]').value;
            const telefono = document.querySelector('input[name="telefono"]').value;
            const email = document.querySelector('input[name="email"]').value;
            const proyecto = document.querySelector('select[name="proyecto"]').value;
            const giro = document.querySelector('select[name="giro"]').value;
            const metraje = document.querySelector('select[name="metraje"]').value;
            const mensaje = document.querySelector('textarea[name="mensaje"]').value;

            // Empaquetamos la información de los selects en el campo de mensaje para HubSpot
            const mensajeCompleto = `[Servicio: ${proyecto}] | [Sector: ${giro}] | [Metraje: ${metraje}] \n\nComentarios: ${mensaje || 'Sin comentarios adicionales.'}`;

            const data = {
                fields: [
                    { name: 'firstname', value: nombre },
                    { name: 'company', value: empresa },
                    { name: 'phone', value: telefono },
                    { name: 'email', value: email },
                    { name: 'message', value: mensajeCompleto }
                ],
                context: {
                    pageUri: window.location.href,
                    pageName: document.title
                }
            };

            const url = `https://api.hsforms.com/submissions/v3/integration/submit/${portalId}/${formId}`;

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(response => {
                if (response.ok) {
                    btn.innerHTML = '<i class="fa-solid fa-check"></i> Solicitud Enviada';
                    btn.classList.replace('bg-brand-orange', 'bg-green-500');
                    btn.classList.replace('hover:bg-[#FF8F24]', 'hover:bg-green-600');
                    e.target.reset();
                } else {
                    statusDiv.innerHTML = 'Hubo un error de conexión con el servidor. Intente más tarde.';
                    statusDiv.classList.add('text-red-500');
                    statusDiv.classList.remove('hidden');
                    btn.innerHTML = 'Enviar Solicitud';
                    btn.disabled = false;
                }
            })
            .catch(error => {
                console.error('Error:', error);
                statusDiv.innerHTML = 'Error de red. Revise su conexión.';
                statusDiv.classList.add('text-red-500');
                statusDiv.classList.remove('hidden');
                btn.innerHTML = 'Enviar Solicitud';
                btn.disabled = false;
            });
        });

        // Partículas (Background)
        const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
        let particles = [];
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        class Particle {
            constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.vx = (Math.random() - 0.5) * 0.4; this.vy = (Math.random() - 0.5) * 0.4; this.radius = Math.random() * 2 + 1; }
            update() { this.x += this.vx; this.y += this.vy; if (this.x < 0 || this.x > canvas.width) this.vx *= -1; if (this.y < 0 || this.y > canvas.height) this.vy *= -1; }
            draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0, 212, 255, 0.4)'; ctx.fill(); }
        }
        for (let i = 0; i < 70; i++) particles.push(new Particle());
        function animate() {
            let gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, Math.max(canvas.width, canvas.height));
            gradient.addColorStop(0, '#0F172A'); gradient.addColorStop(1, '#08111F');
            ctx.fillStyle = gradient; ctx.fillRect(0, 0, canvas.width, canvas.height);       
            particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate);
        }
        animate();
        const observer = new IntersectionObserver((entries) => { entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('is-visible'); }); }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in-section').forEach(el => observer.observe(el));
    </script>
</body>
</html>
