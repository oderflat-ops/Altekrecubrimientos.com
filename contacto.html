<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto y Diagnóstico Técnico | ALTEK</title>
    <meta name="description" content="Solicite un diagnóstico físico sin costo para su proyecto de recubrimientos industriales. Atención inmediata a nivel nacional.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { bg: '#08111F', cyan: '#00D4FF', cyanGlow: 'rgba(0, 212, 255, 0.5)', orange: '#F57C00', glass: 'rgba(16, 24, 39, 0.75)' } } }, fontFamily: { sans: ['Segoe UI', 'sans-serif'] } } }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-panel { @apply bg-brand-glass backdrop-blur-md border border-brand-cyanGlow rounded-3xl p-8 md:p-12 w-full max-w-5xl mx-auto shadow-[0_20px_50px_rgba(0,0,0,0.6)]; }
            .nav-link { @apply flex flex-col items-center gap-1 text-slate-300 hover:text-brand-cyan transition-all text-[0.7rem] font-medium; }
            .nav-icon { @apply w-9 h-9 flex items-center justify-center rounded-full bg-white/5 border border-white/10 text-lg transition-all; }
            .nav-link:hover .nav-icon, .nav-link.active .nav-icon { @apply shadow-[0_0_15px_#00D4FF] border-brand-cyan -translate-y-1 scale-110 text-brand-cyan; }
            .fade-in-section { @apply opacity-0 translate-y-10 blur-sm transition-all duration-700 ease-out; }
            .fade-in-section.is-visible { @apply opacity-100 translate-y-0 blur-none; }
        }
    </style>
</head>
<body class="bg-brand-bg text-white overflow-x-hidden pt-24 pb-20">
    <canvas id="bg-canvas" class="fixed top-0 left-0 w-full h-full z-0 pointer-events-none"></canvas>
    
    <div class="relative z-10">
        <nav class="fixed top-0 left-0 w-full flex justify-start md:justify-center gap-2 md:gap-10 z-50 p-3 bg-brand-bg/95 backdrop-blur-md border-b border-white/10 overflow-x-auto no-scrollbar">
            <a href="/" class="nav-link"><div class="nav-icon"><i class="fa-solid fa-house"></i></div><span class="hidden md:block">Inicio</span></a>
            <a href="/nosotros" class="nav-link"><div class="nav-icon"><i class="fa-solid fa-shield-halved"></i></div><span class="hidden md:block">Nosotros</span></a>
            <a href="/servicios" class="nav-link"><div class="nav-icon"><i class="fa-solid fa-layer-group"></i></div><span class="hidden md:block">Servicios</span></a>
            <a href="/sectores" class="nav-link"><div class="nav-icon"><i class="fa-solid fa-industry"></i></div><span class="hidden md:block">Sectores</span></a>
            <a href="/contacto" class="nav-link active"><div class="nav-icon"><i class="fa-solid fa-satellite-dish"></i></div><span class="hidden md:block">Contacto</span></a>
        </nav>

        <section class="py-12 px-6 md:px-12 flex justify-center min-h-[80vh] items-center">
            <div class="glass-panel fade-in-section w-full max-w-4xl">
                <h1 class="text-3xl md:text-5xl font-extrabold text-white mb-4 text-center">
                    Solicite un <span class="text-brand-cyan">Diagnóstico Técnico</span>
                </h1>
                <p class="text-slate-300 mb-10 text-center max-w-2xl mx-auto">
                    Complete el formulario para que un ingeniero evalúe el estado de sus firmes industriales y coordine una visita a su planta.
                </p>
                
                <div class="grid grid-cols-1 md:grid-cols-5 gap-10">
                    <!-- Información de Contacto Directo -->
                    <div class="md:col-span-2 space-y-6">
                        <div class="bg-slate-900/50 p-6 rounded-xl border border-white/5">
                            <h3 class="text-lg font-bold text-brand-cyan mb-4">Vías Rápidas</h3>
                            <a href="https://wa.me/525535820734?text=Hola,%20me%20gustaría%20agendar%20un%20diagnóstico%20técnico." target="_blank" class="flex items-center gap-3 text-slate-300 hover:text-[#25D366] transition-colors mb-4">
                                <i class="fa-brands fa-whatsapp text-2xl"></i>
                                <span>+52 55 3582 0734</span>
                            </a>
                            <div class="flex items-center gap-3 text-slate-300 mb-4">
                                <i class="fa-solid fa-envelope text-xl text-brand-cyan"></i>
                                <span class="text-sm">alfredo.aguilar@altekrecubrimientos.com</span>
                            </div>
                            <a href="https://calendar.app.google/xdpRTJTifcgFxmqK7" target="_blank" class="mt-6 inline-flex items-center justify-center gap-2 w-full py-3 bg-brand-cyan/10 border border-brand-cyan text-brand-cyan rounded-lg font-bold hover:bg-brand-cyan hover:text-brand-bg transition-all">
                                <i class="fa-regular fa-calendar-check"></i> Agendar en Calendario
                            </a>
                        </div>
                    </div>

                    <!-- Formulario -->
                    <div class="md:col-span-3">
                        <form class="grid grid-cols-1 md:grid-cols-2 gap-4 text-left" action="https://formspree.io/f/xojobwwl" method="POST">
                            <input type="hidden" name="_replyto" value="alfredo.aguilar@altekrecubrimientos.com">
                            <div class="col-span-1 md:col-span-2">
                                <label class="block text-sm font-bold text-white mb-1">Nombre Completo</label>
                                <input type="text" name="nombre" required class="w-full p-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-brand-cyan transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-white mb-1">Empresa</label>
                                <input type="text" name="empresa" required class="w-full p-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-brand-cyan transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-white mb-1">WhatsApp / Teléfono</label>
                                <input type="tel" name="telefono" required class="w-full p-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-brand-cyan transition-colors">
                            </div>
                            <div class="col-span-1 md:col-span-2">
                                <label class="block text-sm font-bold text-white mb-1">Tipo de Necesidad</label>
                                <select name="proyecto" required class="w-full p-3 bg-white/5 border border-white/10 rounded-lg text-slate-800 focus:outline-none focus:border-brand-cyan transition-colors">
                                    <option value="" disabled selected>Seleccione el servicio requerido...</option>
                                    <option value="epoxico">Pisos Epóxicos Industriales</option>
                                    <option value="rehabilitacion">Rehabilitación y Bacheo</option>
                                    <option value="poliuretano">Aislamiento de Poliuretano</option>
                                    <option value="grado_alimenticio">Piso Grado Alimenticio</option>
                                </select>
                            </div>
                            <div class="col-span-1 md:col-span-2">
                                <label class="block text-sm font-bold text-white mb-1">Detalles del proyecto (Metraje aproximado, giro, etc.)</label>
                                <textarea name="mensaje" rows="3" required class="w-full p-3 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-brand-cyan transition-colors"></textarea>
                            </div>
                            <div class="col-span-1 md:col-span-2 mt-2">
                                <button type="submit" class="w-full p-4 bg-brand-orange text-white font-extrabold text-lg uppercase rounded-lg hover:shadow-[0_0_20px_rgba(245,124,0,0.5)] hover:bg-[#FF8F24] transition-all">Enviar Solicitud</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');let particles=[];
        window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight;});
        canvas.width=window.innerWidth;canvas.height=window.innerHeight;
        class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.4;this.vy=(Math.random()-0.5)*0.4;this.radius=Math.random()*2+1;}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0||this.x>canvas.width)this.vx*=-1;if(this.y<0||this.y>canvas.height)this.vy*=-1;}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);ctx.fillStyle='rgba(0,212,255,0.4)';ctx.fill();}}
        for(let i=0;i<70;i++)particles.push(new Particle());
        function animate(){let g=ctx.createRadialGradient(canvas.width/2,canvas.height/2,50,canvas.width/2,canvas.height/2,Math.max(canvas.width,canvas.height));g.addColorStop(0,'#0F172A');g.addColorStop(1,'#08111F');ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animate);} animate();
        const observer=new IntersectionObserver((entries)=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('is-visible');});},{threshold:0.1});document.querySelectorAll('.fade-in-section').forEach(el=>observer.observe(el));
    </script>
</body>
</html>
